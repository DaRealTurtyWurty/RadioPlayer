tasks.register('downloadFfmpegNatives') {
    outputs.dir(ffmpegDownloadDir)

    doLast {
        logger.lifecycle("Bundling FFmpeg natives for: ${ffmpegNatives.collect { it.id }.join(', ')}")
        def outputDir = ffmpegDownloadDir.get().asFile
        outputDir.mkdirs()

        def downloadAndVerify = { String id, String url, String expectedSha256 ->
            def fileName = url.substring(url.lastIndexOf('/') + 1)
            def outputFile = new File(outputDir, fileName)
            try {
                if (!outputFile.exists()) {
                    logger.lifecycle("Downloading ${id}...")
                    download(url, outputFile)
                }

                if (expectedSha256 == null) {
                    def checksumFile = new File(outputDir, fileName + '.sha256')
                    if (!checksumFile.exists()) {
                        def nativeBundle = ffmpegNatives.find { it.url == url }
                        download(nativeBundle.sha256Url, checksumFile)
                    }
                    expectedSha256 = checksumFile.text.trim().split(/\s+/)[0]
                }

                def actualSha256 = sha256(outputFile)
                if (!actualSha256.equalsIgnoreCase(expectedSha256)) {
                    throw new GradleException("""SHA-256 mismatch for ${id}
Expected: ${expectedSha256}
Actual:   ${actualSha256}
File:     ${outputFile.absolutePath}
""")
                }
            } catch (Exception exception) {
                outputFile.delete()
                throw new GradleException("Failed to download or verify ${id}", exception)
            }
        }

        ffmpegNatives.each { nativeBundle ->
            downloadAndVerify("${nativeBundle.id} FFmpeg bundle", nativeBundle.url, nativeBundle.sha256)
        }
    }
}

def extractZipEntry = { File archiveFile, String entryName, File outputFile ->
    ZipFile zipFile = new ZipFile(archiveFile)
    try {
        def entry = zipFile.getEntry(entryName)
        if (entry == null) {
            throw new GradleException("Missing ${entryName} in ${archiveFile.absolutePath}")
        }
        zipFile.getInputStream(entry).withCloseable { input ->
            Files.copy(input, outputFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
        }
    } finally {
        zipFile.close()
    }
}

def extractTarXzEntry = { File archiveFile, String entryName, File outputFile ->
    boolean extracted = false
    archiveFile.withInputStream { fileInput ->
        def tarInputClass = Class.forName(
                'org.apache.commons.compress.archivers.tar.TarArchiveInputStream',
                true,
                gradle.class.classLoader
        )
        URLClassLoader xzClassLoader = new URLClassLoader(
                configurations.ffmpegExtractor.collect { it.toURI().toURL() } as URL[],
                tarInputClass.classLoader
        )
        def xzInput = xzClassLoader.loadClass('org.tukaani.xz.XZInputStream')
                .getConstructor(InputStream)
                .newInstance(fileInput)
        def tarInput = tarInputClass.getConstructor(InputStream).newInstance(xzInput)
        try {
            def entry
            while ((entry = tarInputClass.getMethod('getNextTarEntry').invoke(tarInput)) != null) {
                if (entry.name == entryName) {
                    outputFile.withOutputStream { output -> output << tarInput }
                    extracted = true
                    break
                }
            }
        } finally {
            tarInput.close()
            xzClassLoader.close()
        }
    }
    if (!extracted) {
        throw new GradleException("Missing ${entryName} in ${archiveFile.absolutePath}")
    }
}

tasks.register('extractFfmpegNatives') {
    dependsOn('downloadFfmpegNatives')
    outputs.dir(ffmpegResourceRootDir)

    doLast {
        def outputDir = ffmpegResourceRootDir.get().asFile
        delete(outputDir)
        outputDir.mkdirs()

        ffmpegNatives.each { nativeBundle ->
            nativeBundle.binaryPathsInArchive.each { tool, archivePath ->
                def outputName = tool + (nativeBundle.id.startsWith('windows-') ? '.exe' : '')
                def outputFile = new File(outputDir, "ffmpeg/${nativeBundle.id}/${outputName}")
                outputFile.parentFile.mkdirs()

                if (nativeBundle.url.endsWith('.zip')) {
                    def fileName = nativeBundle.url.substring(nativeBundle.url.lastIndexOf('/') + 1)
                    def archiveFile = new File(ffmpegDownloadDir.get().asFile, fileName)
                    extractZipEntry(archiveFile, archivePath, outputFile)
                } else if (nativeBundle.url.endsWith('.tar.xz')) {
                    def fileName = nativeBundle.url.substring(nativeBundle.url.lastIndexOf('/') + 1)
                    def archiveFile = new File(ffmpegDownloadDir.get().asFile, fileName)
                    extractTarXzEntry(archiveFile, archivePath, outputFile)
                } else {
                    throw new GradleException("Unsupported archive type: ${nativeBundle.url}")
                }
            }
        }
    }
}

tasks.named('processResources') {
    dependsOn('extractFfmpegNatives')
}

artifacts {
