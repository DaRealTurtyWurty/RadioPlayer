static String sha256(File file) {
    def digest = MessageDigest.getInstance('SHA-256')
    file.withInputStream { input ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = input.read(buffer)) != -1) {
            digest.update(buffer, 0, read)
        }
    }
    return digest.digest().collect { String.format('%02x', it) }.join()
}

def download = { String url, File outputFile ->
    def connection = url.toURL().openConnection()
    connection.connectTimeout = 30_000
    connection.readTimeout = 120_000
    connection.setRequestProperty('User-Agent', 'MediaBox Gradle build')
    connection.inputStream.withCloseable { input ->
        outputFile.withOutputStream { output -> output << input }
    }
}

