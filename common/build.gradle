        new FfmpegNativeBundle(
                id: 'windows-x64',
                url: 'https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-07-08-13-30/ffmpeg-N-125505-gc57660fb18-win64-lgpl.zip',
                sha256: '318f64dcb942bdf3242597aa50de0c6b2cb828b1c03205a49ff62d348ec4b32b',
                binaryPathsInArchive: [
                        ffmpeg : 'ffmpeg-N-125505-gc57660fb18-win64-lgpl/bin/ffmpeg.exe',
                        ffprobe: 'ffmpeg-N-125505-gc57660fb18-win64-lgpl/bin/ffprobe.exe'
                ]
        ),
        new FfmpegNativeBundle(
                id: 'linux-x64',
                url: 'https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-07-08-13-30/ffmpeg-N-125505-gc57660fb18-linux64-lgpl.tar.xz',
                sha256: '11f56cf617367175bc1a502c2945491f5d373262abf130f0062ba9ddb853c8e1',
                binaryPathsInArchive: [
                        ffmpeg : 'ffmpeg-N-125505-gc57660fb18-linux64-lgpl/bin/ffmpeg',
                        ffprobe: 'ffmpeg-N-125505-gc57660fb18-linux64-lgpl/bin/ffprobe'
                ]
        ),
        new FfmpegNativeBundle(
