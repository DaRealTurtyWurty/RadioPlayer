import dev.turtywurty.mediabox.gradle.DownloadFfmpegNatives
import dev.turtywurty.mediabox.gradle.ExtractFfmpegNatives

plugins {
    id 'multiloader-common'
    alias libs.plugins.modDevGradle
}

class FfmpegNativeBundle {
    String id
    String url
    String sha256
    Map<String, String> binaryPathsInArchive
}

