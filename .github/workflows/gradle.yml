# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  macos-natives:
    uses: ./.github/workflows/build-macos-ffmpeg.yml
    with:
      ffmpeg_version: "n8.1.2"
      publish_release: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    permissions:
      contents: write

  build:
    needs: macos-natives
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Ensure Gradle wrapper is executable
      run: chmod +x ./gradlew
      
    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4.0.0

    - name: Download macOS FFmpeg natives
      uses: actions/download-artifact@v4
      with:
        pattern: ffmpeg-macos-*
        path: ${{ runner.temp }}/mediabox-ffmpeg
        merge-multiple: true

    - name: Build with Gradle Wrapper
      run: ./gradlew build -PffmpegDownloadDir="${{ runner.temp }}/mediabox-ffmpeg"
