name: Build macOS FFprobe

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: "FFmpeg Git tag"
        required: true
        default: "n8.1.2"

permissions:
  contents: read

jobs:
  build:
    name: Build FFprobe for ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-x64
            runner: macos-15-intel
            expected_arch: x86_64

          - platform: macos-arm64
            runner: macos-15
            expected_arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check runner architecture
        shell: bash
        run: |
          set -euxo pipefail

          ACTUAL_ARCH="$(uname -m)"
          echo "Runner architecture: $ACTUAL_ARCH"

          if [[ "$ACTUAL_ARCH" != "${{ matrix.expected_arch }}" ]]; then
            echo "Expected ${{ matrix.expected_arch }}, got $ACTUAL_ARCH"
            exit 1
          fi

      - name: Download FFmpeg source
        shell: bash
        env:
          FFMPEG_VERSION: ${{ inputs.ffmpeg_version }}
        run: |
          set -euxo pipefail

          git clone \
            --depth 1 \
            --branch "$FFMPEG_VERSION" \
            https://github.com/FFmpeg/FFmpeg.git \
            ffmpeg-source

      - name: Configure FFprobe
        working-directory: ffmpeg-source
        shell: bash
        run: |
          set -euxo pipefail

          ./configure \
            --prefix="$PWD/build" \
            --disable-ffmpeg \
            --disable-ffplay \
            --enable-ffprobe \
            --disable-doc \
            --disable-debug \
            --disable-network \
            --disable-autodetect \
            --disable-shared \
            --enable-static

      - name: Build FFprobe
        working-directory: ffmpeg-source
        shell: bash
        run: |
          set -euxo pipefail

          make -j"$(sysctl -n hw.logicalcpu)" ffprobe

      - name: Verify build and licence
        working-directory: ffmpeg-source
        shell: bash
        run: |
          set -euxo pipefail

          ./ffprobe -version
          file ./ffprobe

          CONFIGURATION="$(./ffprobe -version | grep '^configuration:')"

          if echo "$CONFIGURATION" | grep -q -- '--enable-gpl'; then
            echo "Unexpected GPL build"
            exit 1
          fi

          if echo "$CONFIGURATION" | grep -q -- '--enable-nonfree'; then
            echo "Unexpected nonfree build"
            exit 1
          fi

      - name: Package FFprobe
        working-directory: ffmpeg-source
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          FFMPEG_VERSION: ${{ inputs.ffmpeg_version }}
        run: |
          set -euxo pipefail

          OUTPUT_DIR="$PWD/dist/ffprobe/$PLATFORM"
          mkdir -p "$OUTPUT_DIR"

          cp ffprobe "$OUTPUT_DIR/ffprobe"
          chmod +x "$OUTPUT_DIR/ffprobe"

          cp COPYING.LGPLv2.1 "$OUTPUT_DIR/COPYING.LGPLv2.1"
          cp COPYING.LGPLv3 "$OUTPUT_DIR/COPYING.LGPLv3"
          cp LICENSE.md "$OUTPUT_DIR/LICENSE.md"

          {
            echo "FFmpeg version: $FFMPEG_VERSION"
            echo "Platform: $PLATFORM"
            echo "Architecture: $(uname -m)"
            echo
            ./ffprobe -version
          } > "$OUTPUT_DIR/BUILD-INFO.txt"

          shasum -a 256 "$OUTPUT_DIR/ffprobe" \
            > "$OUTPUT_DIR/ffprobe.sha256"

          ditto -c -k --sequesterRsrc --keepParent \
            "$OUTPUT_DIR" \
            "$PWD/dist/ffprobe-$PLATFORM.zip"

      - name: Upload FFprobe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffprobe-${{ matrix.platform }}
          path: ffmpeg-source/dist/ffprobe-${{ matrix.platform }}.zip
          if-no-files-found: error
          retention-days: 30
